name: engine
description: "Learning apps core engine."
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.11.5
  flutter: ">=3.0.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  go_router: ^15.0.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  assets:
    # 先生アバター（目開閉×口開閉を重ねて合成）。package:'engine' で参照する。
    - lib/images/teacher_base.png
    - lib/images/teacher_closed_eye.png
    - lib/images/teacher_closed_mouse.png
    # アバタービューアのサンプル音声（喋り連動確認用）。
    - lib/audio/teacher_sample.mp3
