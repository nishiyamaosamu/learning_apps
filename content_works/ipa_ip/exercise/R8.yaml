  - qid: R8085
    category: technology
    question_type: single_choice

    content:
      - type: text
        text: |-
          関数isPrimeは，引数として与えられた正の整数が，素数であればtrueを，素数でなければfalseを戻り値とする。例えば，関数isPrimeをisPrime(2)として呼び出したときの戻り値はtrueである。プログラム中のa, bに入れる字句の適切な組合せはどれか。

          〔プログラム〕
          ○論理型: isPrime(整数型: num)
            整数型: div ← 2
            if (num が 2  a  )
              return false
            else
              while (num が div  b  )
                if (num ÷ div の余り が 0 と等しい)
                  return false
                else
                  div ← div + 1
                endif
              endwhile
              return true
            endif
      - type: image
        src: R8085_01.png

    options:
      - id: 1
        content: []
      - id: 2
        content: []
      - id: 3
        content: []
      - id: 4
        content: []

    answer_option_id: 4

    explanation:
      - type: text
        text: |-
          numが2より小さい(=1以下)ならfalse(素数でない)。div=2から始め、divがnumより小さい間ループし約数チェック。
          a=より小さい、b=より大きい(num>div)。
          答えはエ。

