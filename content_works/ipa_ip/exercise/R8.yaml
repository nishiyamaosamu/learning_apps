exercise_id: R8
exercise_title: 令和8年度

categories:
  - id: strategy
    name: ストラテジ
  - id: management
    name: マネジメント
  - id: technology
    name: テクノロジー

exercises:
  - qid: R8001
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: |-
          生成AIを用いた生成物の取扱いに関して，既存の著作物の著作権者から許諾を得ることが必要となる可能性のあるものだけを，全て挙げたものはどれか。

          a　好みのアーティストの楽曲に似た音楽が得られるように生成AIを用いて楽曲を生成し，その楽曲をインターネット上にアップロードし，無料で公開した。
          b　好みのアーティストの楽曲に似た音楽が得られるように生成AIを用いて楽曲を生成し，その楽曲を自分のPC上に保管し，個人で視聴した。
          c　生成AIで音楽を生成したところ，偶然好みのアーティストの楽曲に似た音楽が生成できたので，自分のPC上に保管し，個人で視聴した。

    options:
      - id: 1
        content:
          - type: text
            text: "a"
      - id: 2
        content:
          - type: text
            text: "a, b"
      - id: 3
        content:
          - type: text
            text: "a, b, c"
      - id: 4
        content:
          - type: text
            text: "b, c"

    answer_option_id: 1

    explanation:
      - type: text
        text: |-
          既存著作物に依拠して類似物を生成し公衆送信(アップロード公開)する行為は著作権侵害のおそれがあり許諾が必要です。
          b,cは個人視聴(私的使用)のため著作権法30条の私的複製として許諾不要。
          したがって許諾が必要となる可能性があるのはaのみで、答えはア。

  - qid: R8002
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          BYODに関する記述として，適切なものはどれか。

    options:
      - id: 1
        content:
          - type: text
            text: "企業の業務に，従業員が私物の携帯情報端末を許可を得た上で利用すること"
      - id: 2
        content:
          - type: text
            text: "企業の業務の定型的な作業をソフトウェアのロボットで効率化すること"
      - id: 3
        content:
          - type: text
            text: "企業の業務の流れを分析し，継続的に改善，最適化していくこと"
      - id: 4
        content:
          - type: text
            text: "企業の業務の流れを見直し，抜本的にデザインし直すこと"

    answer_option_id: 1

    explanation:
      - type: text
        text: |-
          BYOD(Bring Your Own Device)は従業員の私物端末を業務利用すること。
          イ:RPAの説明。
          ウ:BPM(業務プロセス管理)の説明。
          エ:BPR(業務プロセス再設計)の説明。
          答えはア。

  - qid: R8003
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          投資会社であるA社が，それぞれの投資戦略を採る場合の利益は，表のように予想される。A社がマクシミン戦略を採り，かつ，市況が好転した場合の利益はどれか。マクシミン戦略とは，戦略ごとに予想される利益の最小値が最も大きくなるように戦略を採用する理論である。
      - type: image
        src: R8003_01.png

    options:
      - id: 1
        content:
          - type: text
            text: "-15"
      - id: 2
        content:
          - type: text
            text: "0"
      - id: 3
        content:
          - type: text
            text: "5"
      - id: 4
        content:
          - type: text
            text: "20"

    answer_option_id: 3

    explanation:
      - type: text
        text: |-
          マクシミン戦略は各戦略の最悪値の中で最大のものを選ぶ。
          投資戦略aの最小値は-15、投資戦略bの最小値は0。
          0>-15なので戦略bを採用。市況好転時の戦略bの利益は5。
          答えはウ。

  - qid: R8004
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          特定の目的の達成や課題の解決をテーマとして，ソフトウェアの開発者や企画者などが短期集中的にアイディアを出し合い，ソフトウェアの開発などの共同作業を行い，成果を競い合うイベントはどれか。

    options:
      - id: 1
        content:
          - type: text
            text: "トレードフェア"
      - id: 2
        content:
          - type: text
            text: "ハッカソン"
      - id: 3
        content:
          - type: text
            text: "パネルディスカッション"
      - id: 4
        content:
          - type: text
            text: "レセプション"

    answer_option_id: 2

    explanation:
      - type: text
        text: |-
          ハッカソンはhack+marathonの造語で、短期集中で開発・成果を競うイベント。
          ア:見本市。ウ:壇上の討論会。エ:歓迎会。
          答えはイ。

  - qid: R8005
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          インターネットを利用した企業広告に関する新たなビジネスモデルを知的財産として出願し，コンピュータシステムとして実現した。このビジネスモデルを知的財産として，保護する法律はどれか。

    options:
      - id: 1
        content:
          - type: text
            text: "意匠法"
      - id: 2
        content:
          - type: text
            text: "実用新案法"
      - id: 3
        content:
          - type: text
            text: "著作権法"
      - id: 4
        content:
          - type: text
            text: "特許法"

    answer_option_id: 4

    explanation:
      - type: text
        text: |-
          ビジネスモデルそのものは保護対象外だが、コンピュータシステムとして実現された「ビジネスモデル特許」は特許法で保護される。
          ア:工業デザイン。イ:物品の形状等の小発明。ウ:著作物。
          答えはエ。

  - qid: R8006
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          デジタルトランスフォーメーションに関する説明として，最も適切なものはどれか。

    options:
      - id: 1
        content:
          - type: text
            text: "PCやスマートフォンなどのデジタル製品を使いこなせる人と，使いこなせない人の間で様々な機会に差が生じて，社会的な格差につながること"
      - id: 2
        content:
          - type: text
            text: "生まれた時からインターネット，PCやスマートフォンなどのデジタル製品が身近にあり，それらを利用しながら育った世代のこと"
      - id: 3
        content:
          - type: text
            text: "音声を収集するマイクロフォンなどからのアナログ信号を，電子ファイルとして保存するためにデジタル信号に変換すること"
      - id: 4
        content:
          - type: text
            text: "デジタル技術が，人間の生活やビジネスなどのあらゆる面に影響を与え，変革をもたらしていくこと"

    answer_option_id: 4

    explanation:
      - type: text
        text: |-
          DX(デジタルトランスフォーメーション)はデジタル技術による生活・ビジネス全般の変革。
          ア:デジタルディバイド。イ:デジタルネイティブ。ウ:A/D変換。
          答えはエ。

  - qid: R8007
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          製品やサービスの価値を機能とコストの関係で把握し，価値の向上をはかる"バリューエンジニアリング"という手法がある。バリューエンジニアリングにおける価値，機能，コストの関係性を示すものとして，適切なものはどれか。

    options:
      - id: 1
        content:
          - type: text
            text: "価値＝機能／（コスト＋機能）"
      - id: 2
        content:
          - type: text
            text: "価値＝機能／コスト"
      - id: 3
        content:
          - type: text
            text: "価値＝機能×コスト"
      - id: 4
        content:
          - type: text
            text: "価値＝コスト／機能"

    answer_option_id: 2

    explanation:
      - type: text
        text: |-
          VEでは 価値=機能/コスト と定義する。機能を高めるかコストを下げれば価値が向上する。
          答えはイ。

  - qid: R8008
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          IoTを利用したシステムの事例として，最も適切なものはどれか。

    options:
      - id: 1
        content:
          - type: text
            text: "資金調達において，不特定多数の借り手と貸し手をインターネット上で仲介するサービスを行う。"
      - id: 2
        content:
          - type: text
            text: "ソーシャルメディアへの書込みや，コールセンターの通話内容などから，商品やサービスに対する利用者の感情を分析する。"
      - id: 3
        content:
          - type: text
            text: "店舗や工場などの設備に設置したセンサーの情報をインターネット経由で集め，設備の状況について，従業員がスマートフォンを用いて監視する。"
      - id: 4
        content:
          - type: text
            text: "文書や画像などの電子ファイルを保存するためのインターネット上のストレージを，サービスとして提供する。"

    answer_option_id: 3

    explanation:
      - type: text
        text: |-
          IoTは機器(モノ)をインターネットに接続して情報収集・制御する仕組み。
          ア:クラウドファンディング。イ:感情分析(テキストマイニング)。エ:オンラインストレージ。
          答えはウ。

  - qid: R8009
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: |-
          製品の製造に関連して発生する次の費用のうち，間接費だけを全て挙げたものはどれか。

          a　完成した製品を検査する労務費
          b　工場の電気供給設備を保守する労務費
          c　製品の外注加工費

    options:
      - id: 1
        content:
          - type: text
            text: "a, b"
      - id: 2
        content:
          - type: text
            text: "b"
      - id: 3
        content:
          - type: text
            text: "b, c"
      - id: 4
        content:
          - type: text
            text: "c"

    answer_option_id: 2

    explanation:
      - type: text
        text: |-
          間接費は特定製品に直接結びつかない費用。
          a:完成品検査労務費は間接労務費。
          b:工場設備保守労務費は間接労務費。
          c:外注加工費は特定製品の加工費なので直接費。
          答えはア。

  - qid: R8010
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: |-
          会議に関する記述のうち，ブレーンストーミングの進め方として，適切なものだけを全て挙げたものはどれか。

          a　自由奔放なアイディアは控え，実現可能なアイディアの提出を求める。
          b　ほかのメンバーのアイディアに便乗した案であっても，とがめずに進める。
          c　メンバーから出されるアイディアの中で，テーマに適したものを選択しながら進める。

    options:
      - id: 1
        content:
          - type: text
            text: "a"
      - id: 2
        content:
          - type: text
            text: "a, b"
      - id: 3
        content:
          - type: text
            text: "a, b, c"
      - id: 4
        content:
          - type: text
            text: "b"

    answer_option_id: 4

    explanation:
      - type: text
        text: |-
          ブレストの4原則は「批判禁止・自由奔放・質より量・便乗歓迎」。
          a:自由奔放を控えるは原則違反。c:選択(評価)は後工程で行う。bのみ適切。
          答えはエ。

  - qid: R8011
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          プロサッカーチームのファンの集いで，人気のある選手が背広姿でサインをしている姿を撮影し，プリントしてフリーマーケットで販売した。この行為によって侵害されるおそれがある選手が有する権利として，最も適切なものはどれか。

    options:
      - id: 1
        content:
          - type: text
            text: "意匠権"
      - id: 2
        content:
          - type: text
            text: "商標権"
      - id: 3
        content:
          - type: text
            text: "著作権"
      - id: 4
        content:
          - type: text
            text: "パブリシティ権"

    answer_option_id: 4

    explanation:
      - type: text
        text: |-
          著名人の氏名・肖像が持つ顧客誘引力を商業利用する権利をパブリシティ権という。本人に無断で写真を販売する行為はこの権利の侵害となる。
          答えはエ。

  - qid: R8012
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          A社は，自社の業務プロセスの課題を抽出し，見直しをするために流れ図を用いて業務プロセスを可視化することにした。A社が流れ図の作成において利用する記述様式として，最も適切なものはどれか。

    options:
      - id: 1
        content:
          - type: text
            text: "CRUD図"
      - id: 2
        content:
          - type: text
            text: "DMM(Diamond Mandala Matrix)"
      - id: 3
        content:
          - type: text
            text: "E-R図"
      - id: 4
        content:
          - type: text
            text: "WFA(Work Flow Architecture)"

    answer_option_id: 4

    explanation:
      - type: text
        text: |-
          WFAは業務の流れを可視化する記述様式。
          ア:データに対する作成・参照・更新・削除を整理する表。イ:発想法。ウ:データのエンティティと関係を表す。
          答えはエ。

  - qid: R8013
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          個人情報保護法に規定された匿名加工情報の説明として，最も適切なものはどれか。

    options:
      - id: 1
        content:
          - type: text
            text: "厚生労働省や総務省統計局などが公開している統計情報を自社向けに加工し，自社の保有する情報とひも付けて新たな価値をもたせた情報"
      - id: 2
        content:
          - type: text
            text: "個人情報のうち氏名を一定の規則に基づいて匿名化するが，元の個人情報への復元を担保した情報"
      - id: 3
        content:
          - type: text
            text: "個人情報を法令に定める方法で匿名化し，復元できないようにしたもので，一定のルールの下で本人の同意なく利活用できる情報"
      - id: 4
        content:
          - type: text
            text: "利用者から個人情報を収集する際に，氏名を取得せず個人番号などほかの情報で個人を識別できるようにして収集した情報"

    answer_option_id: 3

    explanation:
      - type: text
        text: |-
          匿名加工情報は復元不能な形で加工された情報で、本人同意なくルール下で利活用できる。
          答えはウ。

  - qid: R8014
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          ISO 26000とは，組織の社会的責任についての国際規格である。ISO 26000で定められている，企業が果たすべき社会的責任を表す用語として，最も適切なものはどれか。

    options:
      - id: 1
        content:
          - type: text
            text: "CSR"
      - id: 2
        content:
          - type: text
            text: "SDGs"
      - id: 3
        content:
          - type: text
            text: "コーポレートガバナンス"
      - id: 4
        content:
          - type: text
            text: "ソーシャルメディアポリシー"

    answer_option_id: 1

    explanation:
      - type: text
        text: |-
          CSR(Corporate Social Responsibility)が企業の社会的責任。ISO 26000はCSRに関する国際規格。
          イ:持続可能な開発目標。ウ:企業統治。エ:SNS利用方針。
          答えはア。

  - qid: R8015
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          マーケティングにおけるイノベーター理論では，新しい製品やサービスが普及していく過程に沿って，消費者を，イノベーター，アーリーアダプター，アーリーマジョリティ，レイトマジョリティ，ラガードという五つのグループに分ける。このとき，アーリーアダプターからアーリーマジョリティへの普及において生じる，越えることが困難な隔たりを表す用語として，最も適切なものはどれか。

    options:
      - id: 1
        content:
          - type: text
            text: "カニバリゼーション"
      - id: 2
        content:
          - type: text
            text: "キャズム"
      - id: 3
        content:
          - type: text
            text: "死の谷"
      - id: 4
        content:
          - type: text
            text: "レッドオーシャン"

    answer_option_id: 2

    explanation:
      - type: text
        text: |-
          キャズム(chasm)はアーリーアダプターとアーリーマジョリティの間に存在する深い溝のこと。
          ア:自社製品の食い合い。ウ:研究と事業化の間の隔たり。エ:競争激化市場。
          答えはイ。

  - qid: R8016
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          教師あり学習において，正解となる情報を付与する作業を表す用語として，最も適切なものはどれか。

    options:
      - id: 1
        content:
          - type: text
            text: "アノテーション"
      - id: 2
        content:
          - type: text
            text: "エンコード"
      - id: 3
        content:
          - type: text
            text: "データクレンジング"
      - id: 4
        content:
          - type: text
            text: "フィルタリング"

    answer_option_id: 1

    explanation:
      - type: text
        text: |-
          アノテーションは教師あり学習の訓練データに正解ラベルを付与する作業。
          答えはア。

  - qid: R8017
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: |-
          AIを利活用する上で留意すべき事項として，適切なものだけを全て挙げたものはどれか。

          a　AIの意図しない動作によって，人間の生命や身体などに危害を及ぼす可能性
          b　AIの判断に差別的な内容が含まれる可能性
          c　AIの判断にプライバシーの侵害となる内容が含まれる可能性

    options:
      - id: 1
        content:
          - type: text
            text: "a, b"
      - id: 2
        content:
          - type: text
            text: "a, b, c"
      - id: 3
        content:
          - type: text
            text: "a, c"
      - id: 4
        content:
          - type: text
            text: "b, c"

    answer_option_id: 2

    explanation:
      - type: text
        text: |-
          AI利活用では安全性・公平性・プライバシーの全てに留意が必要。a,b,c全て該当。
          答えはイ。

  - qid: R8018
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          コンカレントエンジニアリングを採用する目的として，最も適切なものはどれか。

    options:
      - id: 1
        content:
          - type: text
            text: "開発期間や納期の短縮"
      - id: 2
        content:
          - type: text
            text: "開発製品におけるセキュリティの確保"
      - id: 3
        content:
          - type: text
            text: "開発製品の省エネルギー性能の確保"
      - id: 4
        content:
          - type: text
            text: "開発製品への最新技術の活用"

    answer_option_id: 1

    explanation:
      - type: text
        text: |-
          コンカレントエンジニアリングは設計・製造などを並行して進めることで開発期間を短縮する手法。
          答えはア。

  - qid: R8019
    category: strategy
    question_type: single_choice

    content:
      - type: text
        text: >-
          サーバ上にインストールされたアプリケーションソフトウェアを，インターネット経由で利用者に提供する事業者，又はそのサービス形態として，適切なものはどれか。

