          b　情報システム戦略で想定した効果が，どの程度達成されているか確認するための情報を収集する。
          c　情報システム戦略を実現するために，必要な責任と要員を組織に割り当てる。
          d　情報システムの複数の将来像を想定し，外部の情報システムの専門家に比較分析を依頼して評価する。

    options:
      - id: 1
        content:
          - type: text
            text: "a, b, c"
      - id: 2
        content:
          - type: text
            text: "a, c"
      - id: 3
        content:
          - type: text
            text: "b, c"
      - id: 4
        content:
          - type: text
            text: "b, c, d"

    answer_option_id: 4

    explanation:
      - type: text
        text: |-
          経営陣は責任を委譲できない(a×)。dは経営陣自身が評価する立場で外部に評価を任せるのは不適切。bはモニター、cは指示に該当し適切。
