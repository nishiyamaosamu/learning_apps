    options:
      - id: 1
        content:
          - type: text
            text: "IF(合計(B2:B4)＜2, 合計(B2:B4), IF(合計(B2:B4)=2, 0, 1))"
      - id: 2
        content:
          - type: text
            text: "IF(合計(B2:B4)＜2, 合計(B2:B4), IF(合計(B2:B4)=2, 1, 0))"
      - id: 3
        content:
          - type: text
            text: "IF(合計(B2:B4)＞2, 合計(B2:B4), IF(合計(B2:B4)=2, 0, 1))"
      - id: 4
        content:
          - type: text
            text: "IF(合計(B2:B4)＞2, 合計(B2:B4), IF(合計(B2:B4)=2, 1, 0))"

    answer_option_id: 1

    explanation:
      - type: text
        text: |-
          2の位は B2(繰上)+B3+B4 の合計の2進1桁目。
          合計0→0、合計1→1、合計2→0(繰上1)、合計3→1(繰上1)。
          合計<2なら合計値、=2なら0、それ以外(=3)は1。
          答えはア。

