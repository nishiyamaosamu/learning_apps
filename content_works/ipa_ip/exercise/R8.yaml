  - qid: R8088
    category: technology
    question_type: single_choice

    content:
      - type: text
        text: |-
          プログラミングすることによって，ペンの上げ下げ，直進及び右回りの方向転換が可能なロボットがある。このロボットに1辺が1mの正六角形を描画させるプログラムを作成した。次の正六角形描画プログラムのa, bに入れる字句の適切な組合せはどれか。

          〔正六角形描画プログラム〕
          (1) ペンを下ろす。
          (2) 処理回数のカウンタに  a  を設定する。
          (3) 次の処理を順に実行する。
             ・1m直進する。
             ・右回りに  b  度方向転換する。
             ・処理回数のカウンタに1を加える。
          (4) 処理回数のカウンタが6未満の場合は，(3)に戻る。
          (5) ペンを上げる。
      - type: image
        src: R8088_01.png

    options:
      - id: 1
        content: []
      - id: 2
        content: []
      - id: 3
        content: []
      - id: 4
        content: []

    answer_option_id: 1

    explanation:
      - type: text
        text: |-
          カウンタ初期値0から始めて<6でループ→6回繰返し。正六角形の外角=360/6=60度。
          a=0、b=60。
          答えはア。

