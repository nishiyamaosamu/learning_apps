          クライアントPCへのソフトウェアの導入作業が契約に含まれるシステム開発プロジェクトがある。導入作業の行動に関する記述のうち，適切なものだけを全て挙げたものはどれか。

          a　導入作業中に契約外のPCが見つかった。そのPCを導入対象外とした。
          b　導入作業中に契約外のPCへの導入を依頼された。依頼に基づいて，その対応を無償で行った。
          c　導入作業の続行が困難な状態となった。発注者と合意し，導入前の状態に復旧した。

    options:
      - id: 1
        content:
          - type: text
            text: "a"
      - id: 2
        content:
          - type: text
            text: "a, b"
      - id: 3
        content:
          - type: text
            text: "a, c"
      - id: 4
        content:
          - type: text
            text: "b, c"

    answer_option_id: 3

    explanation:
      - type: text
        text: |-
          a:契約範囲外なので対象外で正しい。b:契約外作業を無償対応するのは不適切(契約変更すべき)。c:発注者合意のうえ復旧は適切。
