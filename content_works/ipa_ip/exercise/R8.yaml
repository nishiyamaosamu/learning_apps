  - qid: R8044
    category: management
    question_type: single_choice

    content:
      - type: text
        text: >-
          あるサービスデスクでは，電子メールによる問合せに対応しており，受付担当者がメールの内容を確認し，回答担当者の割当てをしていた。このたび，割当て業務の効率化を目的に，自動割当てツールを導入した。自動割当てツールは，メールの内容を基に自動で回答担当者の割当てを行うが，割当てができないことや割当てミスをすることがあり，それらについては，人手で対応している。導入前及び導入半年後の状況が次のとき，割当ての時間はサービスデスク全体で何％削減できたか。ここで，割当ての時間の削減率(％)は小数第1位を四捨五入するものとする。
      - type: image
        src: R8044_01.png

    options:
      - id: 1
        content:
          - type: text
            text: "80"
      - id: 2
        content:
          - type: text
            text: "81"
      - id: 3
        content:
          - type: text
            text: "85"
      - id: 4
        content:
          - type: text
            text: "86"

    answer_option_id: 2

    explanation:
      - type: text
        text: |-
          導入前: 1000件×2分=2000分。
          導入半年後: 自動成功900件のうち5%(45件)はミスで4分かかる→180分。残り855件は0分。自動失敗100件×2分=200分。合計380分。
          削減率=(2000-380)/2000=81%。
          答えはイ。

